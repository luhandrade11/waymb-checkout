<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Checkout • WayMB</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --red:#F0004F;
    --red-light:rgba(240,0,79,.08);
    --bg:#f2f2f2;
    --card:#ffffff;
    --text:#1a1a1a;
    --muted:#888;
    --border:#e8e8e8;
    --input-border:#d8d8d8;
    --shadow:0 2px 12px rgba(0,0,0,.08);
  }
  html,body{min-height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}

  /* ── TOP BANNER ── */
  .banner{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:var(--red);
    color:#fff;
    text-align:center;
    font-size:.85rem;
    font-weight:600;
    padding:.65rem 1rem;
    letter-spacing:.01em;
  }
  .banner span{margin-right:.3rem}

  /* ── PAGE ── */
  .page{
    padding:3.5rem 1rem 2rem;
    max-width:430px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:.85rem;
  }

  /* ── CARDS ── */
  .card{
    background:var(--card);
    border-radius:16px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  /* ── PRODUCT HEADER CARD ── */
  .product-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:1.5rem 1.25rem 1.25rem;
    text-align:center;
  }
  .product-logo{
    width:56px;height:56px;
    border-radius:50%;
    background:#1a1a1a;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:1rem;
    overflow:hidden;
    flex-shrink:0;
  }
  .product-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .product-logo svg{opacity:.9}
  .product-name-header{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:.2rem}
  .product-secure{font-size:.78rem;color:var(--muted);font-weight:400}

  /* ── PAYMENT CARD ── */
  .payment-card{padding:1.25rem}

  .payment-product-title{font-size:.95rem;font-weight:700;margin-bottom:.1rem}
  .payment-product-sub{font-size:.78rem;color:var(--muted);margin-bottom:1rem}

  /* total box */
  .total-box{
    background:#f7f7f7;
    border-radius:10px;
    padding:.85rem 1rem;
    text-align:center;
    margin-bottom:1rem;
  }
  .total-label{font-size:.75rem;color:var(--muted);font-weight:400;margin-bottom:.25rem}
  .total-value{font-size:1.65rem;font-weight:700;color:var(--red);letter-spacing:-.02em}

  /* method tabs */
  .method-tabs{display:flex;gap:.5rem;margin-bottom:1rem}
  .method-tab{
    flex:1;
    padding:.65rem .5rem;
    border-radius:8px;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    border:1.5px solid var(--border);
    background:transparent;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    transition:all .15s;
    text-align:center;
  }
  .method-tab.active{
    background:var(--red);
    border-color:var(--red);
    color:#fff;
  }
  .method-tab:not(.active):hover{border-color:var(--red);color:var(--red)}

  /* phone input */
  .phone-group{
    display:flex;
    border:1.5px solid var(--input-border);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:1rem;
    transition:border-color .15s;
  }
  .phone-group:focus-within{border-color:var(--red)}
  .phone-prefix{
    display:flex;align-items:center;gap:.4rem;
    padding:.75rem .9rem;
    border-right:1.5px solid var(--input-border);
    font-size:.88rem;
    font-weight:500;
    color:var(--text);
    white-space:nowrap;
    background:#fafafa;
    flex-shrink:0;
  }
  .phone-input{
    flex:1;
    border:none;outline:none;
    padding:.75rem .9rem;
    font-size:.88rem;
    font-family:'Inter',sans-serif;
    color:var(--text);
    background:transparent;
  }
  .phone-input::placeholder{color:#bbb}

  /* checkbox */
  .terms-wrap{
    display:flex;align-items:center;gap:.6rem;
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:.75rem .9rem;
    margin-bottom:1rem;
    cursor:pointer;
    font-size:.82rem;
    color:var(--muted);
  }
  .terms-wrap input[type=checkbox]{
    width:18px;height:18px;
    accent-color:var(--red);
    cursor:pointer;
    flex-shrink:0;
  }
  .terms-link{color:var(--red);font-weight:500;text-decoration:none}
  .terms-link:hover{text-decoration:underline}

  /* pay button */
  .btn-pay{
    width:100%;
    padding:.9rem;
    border-radius:50px;
    background:var(--red);
    border:none;
    color:#fff;
    font-size:.95rem;
    font-weight:700;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    letter-spacing:.01em;
    transition:opacity .15s,transform .1s;
    display:flex;align-items:center;justify-content:center;gap:.5rem;
  }
  .btn-pay:hover{opacity:.9}
  .btn-pay:active{transform:scale(.99)}
  .btn-pay:disabled{opacity:.65;cursor:not-allowed;transform:none}

  /* ── SUCCESS STATES ── */
  .success-state{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:1.5rem 1rem 1rem;
  }
  .success-state.visible{display:flex}
  .success-title{font-size:1rem;font-weight:700;margin-bottom:.35rem}
  .success-amount{font-size:1.1rem;font-weight:700;color:var(--red);margin-bottom:1.25rem}

  /* MB WAY logo SVG */
  .mbway-logo-wrap{margin-top:.5rem}

  /* Multibanco info */
  .mb-info{
    width:100%;text-align:center;
    font-size:.85rem;
    color:var(--text);
    line-height:2;
    margin-bottom:1.25rem;
  }
  .mb-info strong{font-weight:700}
  .mb-info .mb-val-red{color:var(--red);font-weight:700}

  /* spinner */
  .spinner{
    width:18px;height:18px;
    border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .65s linear infinite;
    flex-shrink:0;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* error msg */
  .error-msg{
    background:rgba(240,0,79,.08);
    border:1px solid rgba(240,0,79,.2);
    border-radius:8px;
    color:var(--red);
    font-size:.78rem;
    padding:.6rem .85rem;
    margin-bottom:.85rem;
    display:none;
  }
  .error-msg.visible{display:block}

  /* polling status bar */
  .polling-bar{
    display:none;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    font-size:.78rem;
    color:var(--muted);
    padding:.5rem 0 0;
  }
  .polling-bar.visible{display:flex}
  .polling-dot{
    width:6px;height:6px;
    border-radius:50%;
    background:var(--muted);
    animation:pulse 1.2s ease-in-out infinite;
  }
  .polling-dot:nth-child(2){animation-delay:.2s}
  .polling-dot:nth-child(3){animation-delay:.4s}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
</style>
</head>
<body>

<!-- TOP BANNER COUNTDOWN -->
<div class="banner" id="banner">
  <span>⏰</span>
  <span>Oferta expira em </span><span id="countdown">10:00</span>
</div>

<div class="page">

  <!-- PRODUCT HEADER CARD -->
  <div class="card product-card">
    <div class="product-logo" id="productLogo">
      <!-- Logo set by JS -->
    </div>
    <div class="product-name-header" id="productNameHeader">TikTok</div>
    <div class="product-secure">Pagamento seguro • WayMB</div>
  </div>

  <!-- PAYMENT CARD -->
  <div class="card payment-card">

    <div class="payment-product-title" id="paymentTitle">TikTok</div>
    <div class="payment-product-sub" id="paymentSub">TikTok</div>

    <!-- Total box -->
    <div class="total-box">
      <div class="total-label">Total a pagar</div>
      <div class="total-value" id="displayAmount">€ 9,90</div>
    </div>

    <!-- FORM STATE -->
    <div id="formState">

      <!-- Method tabs -->
      <div class="method-tabs">
        <button class="method-tab active" id="tabMbway" onclick="selectMethod('mbway')">MB WAY</button>
        <button class="method-tab" id="tabMultibanco" onclick="selectMethod('multibanco')">Multibanco</button>
      </div>

      <!-- Phone (MB WAY only) -->
      <div id="phoneWrap">
        <div class="phone-group">
          <div class="phone-prefix">
            <span>🇵🇹</span>
            <span>+351</span>
          </div>
          <input class="phone-input" type="tel" id="phoneInput" placeholder="912 345 678" inputmode="numeric" maxlength="13" autocomplete="tel"/>
        </div>
      </div>

      <!-- Terms -->
      <label class="terms-wrap">
        <input type="checkbox" id="termsCheck"/>
        <span>Li e aceito os <a class="terms-link" href="#" onclick="return false">Termos e Condições</a></span>
      </label>

      <!-- Error -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Pay button -->
      <button class="btn-pay" id="btnPay" onclick="handlePay()">Pagar agora</button>

    </div><!-- /formState -->

    <!-- MB WAY SUCCESS STATE -->
    <div class="success-state" id="mbwayState">
      <div class="success-title">Aprove no MB WAY</div>
      <div class="success-amount" id="mbwayAmount">€ 9,90</div>
      <!-- MB WAY Logo -->
      <div class="mbway-logo-wrap">
        <svg width="160" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
          <!-- Box outline -->
          <rect x="2" y="10" width="86" height="60" rx="10" ry="10"
                fill="none" stroke="#1a1a1a" stroke-width="5"/>
          <!-- Red bottom bar inside box -->
          <rect x="2" y="54" width="86" height="16" rx="0" ry="0" fill="#F0004F"/>
          <rect x="2" y="54" width="86" height="16" rx="10" ry="10"
                fill="none" stroke="#F0004F" stroke-width="0"/>
          <!-- Rounded bottom corners for red bar -->
          <path d="M2 54 h86 v6 a10 10 0 0 1-10 10 H12 a10 10 0 0 1-10-10 z" fill="#F0004F"/>
          <!-- MB text -->
          <text x="45" y="50" text-anchor="middle" font-family="Inter,sans-serif"
                font-size="30" font-weight="800" fill="#1a1a1a">MB</text>
          <!-- WAY text -->
          <text x="140" y="60" text-anchor="middle" font-family="Inter,sans-serif"
                font-size="34" font-weight="800" fill="#1a1a1a">WAY</text>
        </svg>
      </div>
      <div class="polling-bar visible" id="mbwayPolling">
        <div class="polling-dot"></div>
        <div class="polling-dot"></div>
        <div class="polling-dot"></div>
        <span>A aguardar confirmação...</span>
      </div>
    </div>

    <!-- MULTIBANCO SUCCESS STATE -->
    <div class="success-state" id="multibancoState">
      <div class="success-title">Pagamento Multibanco</div>
      <div class="mb-info" id="mbInfo">
        Entidade: <strong id="mbEntity">—</strong><br/>
        Referência: <strong id="mbReference">—</strong><br/>
        Valor: <span class="mb-val-red" id="mbValue">—</span>
      </div>
      <!-- Multibanco Logo -->
      <svg width="120" viewBox="0 0 140 120" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="134" height="90" rx="12" ry="12"
              fill="none" stroke="#1a6bc4" stroke-width="5"/>
        <text x="70" y="65" text-anchor="middle" font-family="Inter,sans-serif"
              font-size="42" font-weight="900" fill="#1a1a1a">MB</text>
        <text x="70" y="110" text-anchor="middle" font-family="Inter,sans-serif"
              font-size="13" font-weight="700" fill="#555" letter-spacing="2">MULTIBANCO</text>
      </svg>
    </div>

  </div><!-- /payment-card -->
</div><!-- /page -->

<script>
// ── URL PARAMS ──────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const PRODUCT_NAME = params.get("name")        || "TikTok";
const PRODUCT_SUB  = params.get("description") || PRODUCT_NAME;
const AMOUNT       = parseFloat(params.get("amount") || "9.90");
const LOGO_URL     = params.get("logo")        || "";
const TIMER_MINS   = parseInt(params.get("timer") || "10", 10);

// Populate UI
document.getElementById("productNameHeader").textContent = PRODUCT_NAME;
document.getElementById("paymentTitle").textContent       = PRODUCT_NAME;
document.getElementById("paymentSub").textContent         = PRODUCT_SUB;

const fmtAmount = "€ " + AMOUNT.toFixed(2).replace(".", ",");
document.getElementById("displayAmount").textContent = fmtAmount;
document.getElementById("mbwayAmount").textContent   = fmtAmount;

// Logo
const logoEl = document.getElementById("productLogo");
if (LOGO_URL) {
  logoEl.innerHTML = `<img src="${LOGO_URL}" alt="${PRODUCT_NAME}" onerror="this.parentNode.innerHTML='<svg width=24 height=24 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'white\\' stroke-width=\\'2\\'><circle cx=\\'12\\' cy=\\'12\\' r=\\'10\\'/></svg>'"/>`;
} else {
  // Default: first letter of product name
  logoEl.innerHTML = `<span style="color:#fff;font-size:1.4rem;font-weight:800;font-family:Inter,sans-serif">${PRODUCT_NAME.charAt(0).toUpperCase()}</span>`;
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────
let remaining = TIMER_MINS * 60;
const countdownEl = document.getElementById("countdown");
function tickCountdown() {
  if (remaining <= 0) { countdownEl.textContent = "00:00"; return; }
  const m = Math.floor(remaining / 60).toString().padStart(2, "0");
  const s = (remaining % 60).toString().padStart(2, "0");
  countdownEl.textContent = `${m}:${s}`;
  remaining--;
}
tickCountdown();
setInterval(tickCountdown, 1000);

// ── PHONE FORMAT ─────────────────────────────────────────────────────────
document.getElementById("phoneInput").addEventListener("input", function () {
  let v = this.value.replace(/\D/g, "").slice(0, 9);
  if (v.length > 6) v = v.slice(0,3) + " " + v.slice(3,6) + " " + v.slice(6);
  else if (v.length > 3) v = v.slice(0,3) + " " + v.slice(3);
  this.value = v;
});

// ── METHOD SELECTION ─────────────────────────────────────────────────────
let currentMethod = "mbway";
function selectMethod(m) {
  currentMethod = m;
  document.getElementById("tabMbway").classList.toggle("active",      m === "mbway");
  document.getElementById("tabMultibanco").classList.toggle("active", m === "multibanco");
  document.getElementById("phoneWrap").style.display = m === "mbway" ? "block" : "none";
}

// ── STATE HELPERS ────────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.classList.add("visible");
}
function hideError() {
  document.getElementById("errorMsg").classList.remove("visible");
}
function setLoading(loading) {
  const btn = document.getElementById("btnPay");
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<div class="spinner"></div> A processar...'
    : "Pagar agora";
}

// ── MAIN PAY HANDLER ────────────────────────────────────────────────────
async function handlePay() {
  hideError();

  // Validate terms
  if (!document.getElementById("termsCheck").checked) {
    return showError("Por favor aceita os Termos e Condições para continuar.");
  }

  // Validate phone for MB WAY
  let phone = "";
  if (currentMethod === "mbway") {
    phone = document.getElementById("phoneInput").value.replace(/\s/g, "");
    if (!phone || phone.length < 9) {
      return showError("Introduz um número de telefone válido para MB WAY.");
    }
    phone = "+351" + phone;
  }

  setLoading(true);

  try {
    const res = await fetch("/api/create-transaction", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount:             AMOUNT,
        method:             currentMethod,
        paymentDescription: PRODUCT_NAME.slice(0, 50),
        currency:           "EUR",
        payer: {
          name:     PRODUCT_NAME + " Customer",
          email:    "customer@waymb.com",
          document: "000000000",
          phone:    phone || "+351912345678",
        },
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      setLoading(false);
      return showError(data?.message || data?.error || "Erro ao criar transação. Tenta novamente.");
    }

    // Hide form
    document.getElementById("formState").style.display = "none";
    setLoading(false);

    if (currentMethod === "mbway") {
      document.getElementById("mbwayState").classList.add("visible");
      if (data.id || data.transactionID) {
        startPolling(data.id || data.transactionID, "mbway");
      }
    } else {
      // Multibanco
      const ref = data.referenceData || {};
      document.getElementById("mbEntity").textContent    = ref.entity    || "—";
      document.getElementById("mbReference").textContent = ref.reference || "—";
      document.getElementById("mbValue").textContent     = fmtAmount;
      document.getElementById("multibancoState").classList.add("visible");
      if (data.id || data.transactionID) {
        startPolling(data.id || data.transactionID, "multibanco");
      }
    }

  } catch (err) {
    setLoading(false);
    showError("Erro de rede. Verifica a tua ligação e tenta novamente.");
    console.error(err);
  }
}

// ── POLLING ──────────────────────────────────────────────────────────────
let pollTimer = null;
function startPolling(txId, method) {
  let attempts = 0;
  const MAX = 60; // 3 min at 3s intervals

  pollTimer = setInterval(async () => {
    attempts++;
    if (attempts > MAX) {
      clearInterval(pollTimer);
      return;
    }
    try {
      const res  = await fetch("/api/transaction-info", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ id: txId }),
      });
      const data = await res.json();

      if (data.status === "COMPLETED") {
        clearInterval(pollTimer);
        showCompletedUI(method);
      } else if (data.status === "DECLINED") {
        clearInterval(pollTimer);
        showDeclinedUI(method);
      }
    } catch (_) { /* network blip, retry */ }
  }, 3000);
}

function showCompletedUI(method) {
  const stateId = method === "mbway" ? "mbwayState" : "multibancoState";
  const el      = document.getElementById(stateId);
  el.innerHTML  = `
    <div style="width:56px;height:56px;border-radius:50%;background:rgba(34,197,94,.12);
                border:2px solid rgba(34,197,94,.3);display:flex;align-items:center;
                justify-content:center;margin-bottom:1rem">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
           stroke="#22c55e" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:.3rem">Pagamento confirmado!</div>
    <div style="font-size:.82rem;color:#888;line-height:1.5">
      O teu pagamento de <strong style="color:var(--red)">${fmtAmount}</strong> foi recebido com sucesso.
    </div>`;
  el.classList.add("visible");
}

function showDeclinedUI(method) {
  const stateId = method === "mbway" ? "mbwayState" : "multibancoState";
  const el      = document.getElementById(stateId);
  document.getElementById(stateId).classList.remove("visible");
  // Show form again with error
  document.getElementById("formState").style.display = "block";
  showError("Pagamento recusado. Verifica os teus dados e tenta novamente.");
}
</script>
</body>
</html>
